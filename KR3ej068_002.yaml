body:
  text: 卷二穴象手法穴道圖象潛菴曰推拿一書其法最靈或有不靈認穴之不真耳即如頭為諸陽之首面為五臟之精華十指聯絡於周身之血脈穴不真則竅不通竅不通則法不靈故豫於斯書首著訣法總綱次詳全身經穴而圖象昭焉手法明焉百病除焉穴在頭腦者百會穴在頭頂毛髮中以線牽向發前後左右重囟門穴在百會前即泥丸也中庭穴在髮際上邊些天庭穴即天門又名三門天心穴在額正中略下於天庭兩額在太陽之上印堂在兩眉心中名二門額角左為太陽右為太陰風府在腦後枕骨下俗名腦窩天柱即頸骨也穴在面者山根在兩眼中間鼻梁骨名二門三陽左眼胞三陰右眼胞準頭名年壽即鼻也龍角一名文臺在左發毛虎角一名武臺在右發毛風門在兩耳門外風池在目上胞一名坎上氣池在目下胞一名坎下左頰右頰在顴之旁兩頤在上口唇兩旁即腮也水溝在準頭下人中是也食倉穴在兩頤下承漿穴在人中下地角穴在手指者少商穴在大拇指尖商陽穴在食指尖指根下一節橫紋是風關從掌上巽宮來二橫紋是氣關三橫紋是命關中衝穴在中將指尖關衝穴在無名指尖少衝穴在小拇指尖大腸穴在食指外邊小腸穴在小拇指外邊四橫紋在食將無名小指中四道小橫紋除去大指故名四穴在陽掌者內牢宮在手心正中屬涼八卦將指根下是離宮屬心火運八卦必用大指掩掌不可運恐動心火坎宮緊與離宮相對在小天心之上屬腎水乾宮名天門一名神門在坎宮之右小天心在坎宮下中門陽池穴陰池穴在小天心兩旁販門穴在大指下一塊平肉如板大橫紋在手掌下一道橫紋浮心穴在大橫紋左邊腎經穴在大橫紋右邊二人上馬在小指旁三四橫紋及掌乾宮旁水底穴在小指旁從指尖到乾宮外邊皆是虎口穴大食二指丫叉處筋通三關處穴在陽膊者總筋穴在大橫紋下指之脈絡皆總於此中四指脈總於此內間史穴在總筋下寸許一名內關候天河穴在內間史下自總筋直往曲池曲池穴在手灣處一名洪池經渠穴在浮心一邊內間史旁列缺穴在徑渠下天河旁魚脊穴陽池旁邊一小窩處乃大指散脈處三關穴在手膊上旁邊六腑穴在手膊下旁邊穴在陰掌者外牢宮在手背正中屬暖合骨穴在手背大指食指兩骨丫叉相合之間威靈穴在外牢右邊骨縫處精靈穴在外牢左邊骨縫處一扇門在食將二指下夾縫處威靈穴之上二扇門在無名指根兩夾縫處大陵穴外牢下手背骨節處穴在陰膊者一窩風穴大陵位下手膊上與陽膊總筋下對陽池穴在外間史下外間史穴在一窩風下與內間史相對一名外關候肩井穴在肩膊眼窩內𦙒肘穴在手肘曲處高起圓骨處穴在前身者人迎穴喉之左右膻中穴在人迎下正中與背後風門相對皆肺家華蓋之系天樞穴在膻中穴下兩旁兩乳之下乳穴在兩乳下鳩尾穴掩心骨盡處肚臍穴一名神闕丹田穴即氣海也肚角穴腰下兩旁往丹田處也中脘穴胃藏飲食處期門穴在兩脅下軟處吸氣之所關元穴臍下寬平處與下氣海相連腎囊卵胞穴在脊背者風門穴在脊骨二節下中樞穴在脊骨七節之上七節骨穴與心窩相對心俞穴在七節骨左寸許肺俞穴在七節骨右寸許腰俞穴對前腰旁膀胱穴在左股上命門穴在右股上龜尾穴一名閭尾脊背盡頭處穴在腿足者鬼眼穴在膝頭膝眼委中穴在膝彎陷處前承山穴一名子母穴在下腿之前與承山相對一名中腫穴後承山穴一名後水穴如魚肚一般在腿肚上一名魚肚穴百蟲穴在大腿之上外邊三里穴在膝頭之下外鬼眼穴在膝外眼陷處鬼脹穴在後腿肚旁蟹溪穴在腳面上彎處與下中指相對蹼參穴在腳後根上一名鞋帶穴大敦穴在足大指上湧泉穴在腳板心中處面部氣色十二經總現五位色青驚積不散五位色紅傷寒痰壅積成驚悸五位色黃食積疳痞五位色白氣不充實滑泄吐痢五位色黑臟腑欲絶疾危症惡面青眼青肝病面赤唇紅心病面黃鼻黃脾病面類白色肺病五臟各有所屬細探其色即知表裡虛實盈虧其寒熱補泄之法可考而知也五指經絡內外祕旨隨手形象開附於後中指名為將指屬心心氣通於舌絡聯於將指通背左筋心俞穴手中衝穴足湧泉穴大拇指下一指名為食指屬肝肝氣通於目絡聯於食指通於小天心穴足大溪穴中指屬心大宜泄不宜補小兒初生不叫食乳是胎大攻心推二三十下喂以延壽丹三粒灌之即叫即食北方臥坑食大燒之物多此症屢驗天門入虎口一手拿兩穴大指拿天門食指拿虎口大拇指屬脾土脾氣通於口絡聯於大指通背右筋天樞穴手列缺穴足三里穴揉運脾土男左手補女右手右運為補或屈大指側推致電版門以補脾土立進飲食陽池魚際穴散脈處從此側推三關取真火內牢撈明月退熱在此陰池分陰陽在此小指上一指名為無名指屬肺肺氣通於鼻絡聯於無名指通胸前膻中穴背後風門穴小指屬腎腎氣通於耳絡聯於小指通目瞳人手合骨穴足大敦穴大腸筋在食指外邊絡聯於虎口直到食指側巔小腸筋在小指外邊絡聯於神門直至小指側巔大陵位熱久不退反推此穴用以卻不與食指相連殆抄訛歟此穴與食指相連肺經相近有火攻大之法乃盡頭指也疾標此精靈精靈穴在外牢左邊與上二扇門相對與無名指相聯肺經相近威靈此穴與中指相連通心急驚變手指此叫則治不叫難浟一窩風外間史離一窩風僅三指過去屬陽五指歌五指梢頭冷驚來神不安若逢中指熱必定是傷寒中指獨自冷疹痘症相當男女分左右醫家仔細看按穴卻病手法論潛菴曰仙女傳救嬰兒妙法實諳先天機微左旋右揉推拿掐運諸穴手法至妙至精苟缺一穴而衆穴不靈稍少一法而妙法不真醫家必深思其義蘊而詳究其指歸乃為有濟然法雖有定變通在人標本先後輕重多寡之間用手法而不泥乎法神乎法而不離乎法神而明之存乎一心所當競競致意者爾手法祕旨凡觀小兒病症男觀左手右腳女觀右手左腳必察何經絡得其症候方知道推某筋掐某處久揉驗總要先觀兒虛實而手法推之數目即一定之一歲三百不可拘也此二句所謂用法而不泥乎法也可證諸家某穴推若千數之謬又要審定主穴某病症以某穴為主則衆手該用者在前而此主穴在後多用工夫從其重也蓋穴有君臣推有緩急用數穴中有一穴為主者而一穴君也衆穴臣也相為表裡而相濟者也故赤子之病有一視而愈者亦有推數穴而不愈者是不明於察形辨症之主穴也有一穴而治數病者有數穴而治一病者有一手而拿兩穴者有兩手而拿一穴者有病輕而推數穴不愈者有重病而推一二穴即愈者總待人神明其源而精乎其極也故云病輕一時松病重費日功若平日有慣者病推畢後必用總收手法其病方永久不犯用手法者慎思之分補泄左右細詳祕旨歌補泄分明寒與熱左轉補兮右轉泄男女不同上下推子前午後要分別寒者溫之熱者涼虛者補之實者泄手足溫和順可言冷厥四肢凶莫測十二經中看病源穴真去病湯澆雪又補泄辨補者往指根里推也如推脾土須屈小兒大指從指之外邊側推到囟門此為補伸兒指者非也泄者向指根往外推也推脾不宜惟推肝腎肺以泄火如此掐運推拿辨掐者用大指甲將病處掐之其掐數亦如推數運者運五經八卦也五經用食將指平行八卦用大指肉側行惟離宮屬火不可運醫者拿小兒手即自以大指覆按之推者一指推去而不返返則向外為泄或用大指或用三指穴道不同惟心經無推揉者揉天樞用大將二指雙揉齊揉中脘全掌揉曲池陽池將指揉臍與龜尾皆搓掌心用三指揉之或用二指視小兒大小詳觀筋色屬五行生剋掐法祕旨赤筋乃浮陽屬火應心與小腸主霍亂外通赤龍燥熱乾宮掐之則陽火即散青筋乃青陽屬木應肝與膽主溫和外通眼目赤濫多淚坎位掐之則目自明黃筋屬土居中五行應脾胃主溫暖腸鳴霍亂吐瀉痢疾皆中界總筋處掐之淡黃筋居中屬火土應三焦主半寒半熱生壅塞之症宜中宮內牢掐之白筋乃濁陰屬金應肺與大腸外通鼻主腹滿腦昏生痰宜界外指臂掐之立效黑筋純陰屬水應腎與膀胱外通兩耳主冷氣昏沉宜向邊位小指側掐之補泄抑法子後火盛者是陽火宜泄之午後火盛者是陰火宜補之先熱後寒者是陰乾陽先泄後補先寒後熱是陽干陰先補後泄日間病重者宜抑陽夜間病重者宜抑陰論穴分寸屈小兒中指節度之為寸折半為五分非分寸之謂也三關六腑祕旨歌小兒元氣勝三關推動三關真火然真火熏蒸來五臟小兒百脈皆和暢元氣既足邪氣退熱極不退六腑推若非極熱退愈寒不如不退較為安六腑愈寒疾愈盛水火相交方吉慶解曰推三關取熱退六腑取涼猶醫家大寒大熱之劑若非大寒大熱必二法交用取水火相濟之義也取溫涼汗吐瀉祕旨凡身熱重者但撈明月或揉湧泉引熱下行或揉臍及鳩尾方用芽茶嚼爛貼內間史穴上又方用靛搽手足四心又用水粉乳調搽太陽四心即熱退矣凡身涼重者揉外牢宮囟門穴揉二扇門推三關揉陽位方用蘄艾揉細火烘敷臍立熱凡要取汗推三關揉二扇門黃蜂入洞為妙凡要止汗者退六腑補肺經如不止方用浮小麥煎湯灌之立效至無疾自汗乃小兒常事不可過疑凡取吐泄者外牢推至大陵位取吐方知為第一大陵反轉至牢宮泄下心火無止息左轉三來右一摩此是神仙真妙訣凡止吐泄者嘔吐乳食真可憐囟門來至橫紋中橫紋若轉囟門去吐泄童子得平安其間口訣無多記往者俱重過者輕此合上外牢二法俱圓推男左轉女右轉去重回輕此一節須詳究各穴用法總歌須熟讀細玩心經一掐外牢宮三關之上慢從容從容者慢緩則周到有力取汗要法汗若不來揉二扇黃蜂入洞有奇功肝經有病人多痹痹者昏睡眼昏沉迷以補脾土運八卦為主推補脾土病即除八卦大腸應有用飛金走氣亦相隨咳嗽痰涎嘔吐時咳者肺管有風久咳肺系四垂不收推肺腎為主一經清肺次掐離離宮推至乾宮至兩頭重實中輕虛以補脾為主飲食不進補脾土人事瘦弱可為之屈為補兮清直泄妙中之妙有玄機以腎水為主小水赤黃亦可清但推腎水掐橫紋短少之時宜用補赤熱清之得安寧大腸有病泄瀉多側推大腸久按摩分理陰陽皆順息補脾方得遠沉疴小腸有病氣來攻橫紋囟門推可通用心記取精靈穴管教卻病快如風命門有病元氣虧脾土大腸八卦為側推三關真火足天門𦙒肘免災危三焦有病生寒熱天河六腑神仙訣能知取水解炎蒸分別陰陽掐指節膀胱有病作淋疴補水八卦運天河膽經有病口作苦重推脾土莫蹉跎腎經有病小便澀推動腎水即清徹腎脈經傳小指尖依方推掐無差忒胃經有病食不消脾土大腸八卦調胃口涼時心作噦囟門溫熱始為高心經有熱發迷癡天河水過作洪池心若有病補上膈三關離火莫推遲肝經有病人閉目推動脾土效即速脾若熱時食不進再加六腑病除速手法治病歌水底明月最為涼清心止熱此為強飛金走氣能行氣赤鳳搖頭助氣良黃蜂入洞最為熱陰症白痢並水瀉發汗不出後用之頓教孔竅皆通泄大腸側推到虎口止吐止瀉斷根源瘧痢羸瘦並水瀉心胸痞滿也能痊掐肺經絡節與離推離往乾中要輕冒風咳嗽並吐逆此筋推掐抵千金腎水一紋是後溪推下為補上為清小便閉塞清之妙腎經虛損補為能六腑專治臟腑熱遍身潮熱大便結人事昏沉總可推去火渾如湯潑雪總筋天水皆除熱口中熱氣並刮舌心驚積熱火眼攻推之即好真妙訣五經運通臟腑塞八卦開通化痰逆胸膈痞滿最為先不是知音莫與泄四橫紋和上下氣吼氣肚痛掐可止二人上馬清補腎小腸諸病俱能理陰陽能除寒與熱二便不通並水瀉諸病醫家先下手帶繞天心坎水訣人事昏迷痢疾攻疾忙急救要口訣天門雙掐到虎口𦙒肘重揉又生血一掐五指節與離有風被喝要須知小天心能生腎水腎水虛少推莫遲囟門專治氣促攻扇門發熱汗宜通一窩風能治肚痛陽池穴上治頭疼外牢治瀉亦可用拿此又可止頭疼精靈穴能醫吼氣威靈促死能回生推五臟虛實病源治法歌心實叫哭兼發熱飲水驚搐唇破裂天河六腑並陰陽飛金水底撈明月虛則困臥睡不安補脾便是神仙訣左轉心經與牢宮再分陰陽三五百肝實頓悶並呵欠目直項急叫多驚右轉心經推六腑天河明月兩相親虛則咬牙迷多欠補腎三關掐大陵揉按中指單展翅再把陰陽著力分脾實困睡頻頻飲身中有熱覺沉疴推脾推肺推六腑運水入土並天河虛則有傷多吐瀉左轉心經熱氣疴赤鳳搖頭並運卦陰陽外間便宜多肺實悶亂兼喘促或飲不飲或啼哭泄肺陰陽六腑河八卦飛金與合骨虛則氣短喘必多哽氣長出氣來速補脾運卦分陰陽離輕乾重三百足腎主瞳人目畏明又無光彩少精神解顱死症頭下竄白精多過黑瞳睛麵皮㿠白宜推肺腎脾兼補要均停重耳中諸揉百次尿黃清腎卻通淋驚風定生死祕旨歌急驚父母惶恐慢驚醫家擔心不語口閉眼翻睜下手便掐威靈兩手大指齊掐手嫩隔絹方輕一聲顯叫得歡欣不醒還須法應囟陷不跳必死開而跳者還生再掐中衝要知音知痛聲音動聽大溪眼可掐動腎頭掐亦蘇醒兩乳穴下探生死舍此何須又論手法同異多寡宜忌辨明祕旨歌小兒周身穴道推拿左右相同三關六腑要通融上下男女變通男左手女右手男從左手外往裡推為補從里往外推為清推女相反在右手脾土男左為補女補右轉為功陰陽各別見天工除此俱該同用急驚推拿宜泄痰火一時相攻自內而外莫從容攻去痰火有用慢驚推拿須補自外而內相從一切補泄法皆同男女關腑異弄法雖一定不易變通總在人心本緩標急重與輕虛實參乎病症初生輕指點穴二三用力方憑五七十歲推漸深醫家次第神明一歲定須三百二周六百何疑月家赤子輕為之寒火多寡再議年逾二八長大推拿費力支持七日十日病方離虛誑醫家誰治禁用三關手法足熱二便難通渴甚腮赤眼珠紅脈數氣喘舌弄忌用六腑手法泄青面㿠白容脈微吐嘔腹膨空足冷眼青休用小兒可下病症下者六腑也實熱面赤眼紅腹膨脅滿積難通浮腫痄腮疼痛小便赤黃壯熱氣喘食積宜攻遍身瘡疥血淋漓腹硬肚痛合用不可下有數症囟陷肢冷無神不時自汗泄頻頻氣虛乾嘔難忍面白食不消化虛疾潮熱腸鳴毛焦神困脈微沉煩燥鼻塞咳甚用湯時宜祕旨歌春夏湯宜薄荷秋冬又用木香咳嗽痰吼加蔥薑麝尤通竅為良加油少許皮潤四六分做留余手法一歲雖云三百然必輕者四分重者六分以待加減試病加減不難知如此見功尤易四季俱用蔥薑煎湯加以油麝少許推之
