body:
  text: 卷五幼科藥方潛庵曰推拿小兒由初生月內以及周年三五歲時手法少去病速良甚便也及八九十歲童年漸長難施手法之萬遍必以藥餌濟之故選集效驗良方以附於後是為五集男女稀痘丹痘症不用推拿反以為害忌之萆麻子肥白者三十六粒真麝香五釐真硃砂一錢以透紅劈砂為上先將香砂二味研碎次將萆麻和一處研極細成膏於五月五日搽小兒頭頂心百會穴兩手心兩膀彎曲池穴兩脅窩兩腿彎兩腿丫兩腳心湧泉穴共十三處搽如錢大不可使藥有餘剩搽後不可洗動聽其自落如藥干以津唾和之本年搽一次出痘稀少次年再搽出痘數粒又次年再搽永不出痘抑或兒生在端午後於七月七日九月九日依前法搽之亦妙傳方之家已永不出痘豈但稀而已哉且搽在皮膚外毫無傷損真寶幼靈丹不可忽也治小兒眼內痘花神效方用活麥門冬洗淨和糯米糟搗爛左眼有痘花敷右腳根右眼內有痘花敷左腳根其花自行跳出要在百日之內如遲久不效治小兒未能語啼哭不能辨方當以手按其腹如有硬處即是腹痛用生薑研之取汁令暖溫調面成糊塗紙上貼臍心立定紫金錠治嘔吐人參白朮茯苓茯神山藥乳香辰砂各一錢五分牛黃五分姜蠶五錢五靈脂五錢青礞石一錢煅赤石脂醋淬七次上為末用糯米糊和成錠金箔為衣陰乾每症薄荷湯磨化一分食乳者揉乳上餵乳吞下如不食乳者捏鼻挑入口灌下即好抱龍丸治二十四驚並麻痘首尾又時症南星八錢為末天竺黃五錢雄黃二錢辰砂二錢麝香一錢上用甘草煮濃汁為丸如黃豆大金箔為衣薄荷湯送下一丸即愈保和錠子治急慢驚風立效辰砂錢半水飛人參去蘆白朮去油茯苓去皮茯神俱一錢赤石脂醋煅山藥俱一錢五分乳香二錢五分礞石一錢煅牛黃姜蠶五靈脂麝香俱五分上為末金箔十張大米糊為丸量兒大小薄荷湯送下胃苓散乃小兒常服之藥治小兒分理陰陽退潮熱止吐瀉消腫退疸黃調脾胃止便泄蒼朮五錢陳皮五錢粉草二錢澤瀉四錢厚朴五錢豬苓三錢去黑皮白朮五錢茯苓三錢草果仁三錢官桂一錢共為細末水糊為丸如粟米大嘔吐薑湯下又白濁鹽湯下調脾炒米湯下泄瀉車前炒米湯下疝氣茴香湯下浮腫燈心五加皮煎湯下疸黃本方一料加茵陳五錢用燈心車前湯下治盜汗方用牡蠣一錢為末酒服即止治吐瀉立止方用線隨臍眼纏過腰以背溝線上五分燋之止瀉下五分燋之止吐若吐瀉兩症以線中心一燋立止若久瘧此處三燋真千金不易之良方也健脾丸茯苓一錢山藥一錢白朮一錢土炒陳皮六錢蓮肉去心八錢扁豆八錢炒澤瀉八錢神麯六錢山楂肉一兩二錢共為細末煉蜜為丸似福元大每日飲湯送下一丸延壽丹祕方治病目一切火症神效用錦紋大黃切片或半斤或一斤即三五斤十斤亦可先以上好白酒或上好黃酒浸兩晝夜入砂鍋煮一枝大香取出鋪在板上曬極干二次三次亦如之到四制用藁本煎汁其浸止用一晝夜煮曬如前五制用車前草採來洗淨灑水搗汁浸煮曬如前六制用側柏葉向東南的清辰採來水洗搗汁浸煮曬如前末後三制仍用酒浸煮曬曬到九次止曬半乾便上石臼搗爛為丸或一分重或三分重或一錢二錢三錢重相其兒之大小火症之輕重加減用之此係仙訂與九制古方迥不相同神而明之豈僅小兒為神妙哉治疳疾良方如小兒眼中有翳先服延壽丹丸速退之然後用豬肝半斤將石決明煅過擂碎將肝梭開放入決明以麻札了入水罐煨熟取出麻與決明即以湯洗淨切肝與小兒食之醬油不忌兩三次食完半斤待出大恭即愈屢試屢驗治小兒眉爛頭瘡方用小麥炒黑色為末酒調敷即好治小兒乳癬多生耳後令伊母嚼白米成膏塗之即愈治小兒刀切破手用鍋蓋屑刮下敷之立效治小兒火燒滾湯起泡用陳蕎麥麵打糊裱上立止疼痛結蓋即愈治小兒頭痛用艾餅敷頭頂神效治小兒臍腫用荊芥煎湯次用蔥一根火上炙過放在地下退去火毒取起刮薄貼上即消補中益氣湯治中氣虛弱瘦體或發熱煩渴人參八分黃耆八分白朮五分立炒甘草五分炙陳皮五分升麻二分柴胡二分當歸三分薑棗為引水煎服藿香正氣散治感冒暑寒霍亂轉筋吐瀉及傷寒頭疼壯熱之症藿香蒼朮半夏茯苓白者紫蘇各三兩大腹皮黑豆水洗淨各三兩白芷厚朴陳皮各二兩桔梗甘草各一兩上為末每服二錢加薑棗水煎溫服治黃水瘡用真麻油調黃松香面搽之即愈治小兒脫肛先以蔥湯薰洗後用五倍子燒灰存性托上即愈服補中益氣湯兩三劑尤妙治小兒大小便不通用蔥白和蜜搗攤布上為膏貼臍上即大便貼腎囊即小便立效大人亦用此立效治小兒胎叫方凡胎中子叫是子口中偶失血餅法令母屈身就之餅入口即愈如不然用緑豆一升撒地令母盡皆拾完自然不叫治瘰癧神效方用蛇頭果子草四五月間生時採來焙乾煮酒飲之盡醉發汗如此三次以後止飲酒不必汗未潰者消已潰者用膏藥貼即愈亦須飲此酒治小兒肥瘡方枯白礬三錢香附子三錢煎水洗即脫治猴子瘡方天雨鳴雷時有瘡者不與人知自己立於檐下以手抹去猴子口中默念雷打猴子快走念七遍抹七遍即自落念時迎著雷向天井外抹去神效治小兒偶不能言方用鮮薑汁沖麩曲熱酒沖服即愈治脛上鼠瘡方夏枯草五兩無根水三碗久煎成膏搽患處又不拘時服即消去矣治兒生已逾年柔軟不堪持抱無疾是居樓所生未得地服灶心土三分即起立治小兒四肢冷明礬五錢炒鹽二錢黃蠟二錢貼在臍上即愈若氣急取竹瀝水服之治遍身熱不退明礬一錢和雞蛋清調勻搽四心即退又方用桃仁七粒酒半鍾擂細貼在鬼眼便好治肚脹作渴眼光用生薑蔥白生酒半鍾擂酒吞下則眼不光將雄黃不拘多少燒熱放在臍上揉治膿耳乃少陽風熱熾盛而上升也臭爛作痛須用黃龍散枯白礬龍骨煅黃丹水飛胭脂海螵蛸米泔水浸上為細末加麝香少許再研先以紙條捻干膿水後以藥吹入切記避風又方用貓兒刺和報花煮水洗之即止治痞塊方用大荸薺一百個古錢二十個海蜇一片花頭者炒皮硝四兩燒酒三斤共一處浸七日後每日朝上吃四個加到十個止即愈治久暫瘧疾良方青皮陳皮柴胡厚朴神麯草果白朮白茯半夏甘草烏梅三個升麻蒼朮晚間煎引用姜一片紅棗二枚煅熟次早服禁一日飲食言語藥不使婦女煎如不止再服一劑必愈治噤口痢良方用野菱角一升土石臼搗爛極汁一鍾又一鍾酒熱服即愈八珍糕方白朮一兩五錢土炒白茯苓一兩五錢山藥一兩五錢扁豆一兩五錢山楂一兩五錢去核苡仁一兩五錢蓮肉一兩五錢去心芡實一兩五錢秈米二升半糯米半升上為細末入米麵中加糖斤半蒸糕治走馬牙疳速效神方水銀一錢用錫化五分入上水銀成粉將舊紅褐子燒灰合五倍子燒焦共成面一錢二分將真麻油調一二茶匙作兩次搽宜少許不可多用擦在牙跟患處有涎即張口流去不可入肚去腐生肌立刻止疼兩三日即收功仍用冬青葉煎水漱口全愈神效屢驗大人亦用此救治火延丹方用白海蜇皮洗淨拭乾將腿腫包了對日揭開看海皮黃枯不可用另換一張包裹如此三四張即消散如常神效驗過治凍瘡妙方用雪擦洗凍處即愈如破裂用魚膠熬化攤膏藥貼上長平自落神效驗過治胃氣疼方蒼朮面一兩五倍子面一兩兌均一處每用止三釐沖酒服之立愈將死者即可回生止用三釐不可多用治小兒肥瘡用老鹽魚一塊香油炙焦去魚以油搽瘡即愈
