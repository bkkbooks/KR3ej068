body:
  text: 卷四推拿病症分類胎毒門胎毒者胎中受母熱毒致生病症三朝一七十日半月之內最難救治五六日尤難速服延壽丹豆大三粒即愈啞口啞口者受母胎中熱毒心寒氣蔽落地無聲此時不暇用推法速服延壽丹少許即愈口禁兒生三日不哭不乳是云口禁此胎受火毒攻心傳肺故飲食不進啼哭無聲速服延壽丹少許即愈臍風兒生一七之內肚脹腹硬臍圍浮腫口撮眉攢牙關不開名臍風撮口症蓋因臍帶剪短或結縛不緊致水濕侵臍客風乘虛而入傳之於心蘊蓄其邪復傳脾絡舌強唇青手足微搐喉中痰響是其候也服延壽丹少許即愈如神脫氣冷不治馬牙小兒月內打噴即是馬牙蓋因氣血薄弱不能制伏其毒以致心火上炎牙齦遍生白色用針刺破毛青布蘸水掠洗後用金墨搽不復長宜服延壽丹少許即愈鵝口小兒胎火攻心致上齶有白點狀如粟米名曰乳鵝或口內白沫滿舌上齶戴礙狀如鵝口開而不合語聲不出乳食多艱皆由熱毒上攻也治法宜分陰陽運八卦清心經撈明月宜服延壽丹重舌木舌脾之脈絡系舌旁肝之脈絡系舌本心之脈絡系舌根三經受胎毒而上攻舌下又像有一舌名曰重舌舌腫如木名曰木舌又或舌捲縮或舒長或腫滿此風熱盛而妨乳食也又或生瘡破裂胃有濕熱四肢壯熱是其候也法宜分陰陽運八卦清心經清脾經清肝經撈明月清天河宜服延壽丹夜啼夜啼有四胎驚夜啼邪火入心心與小腸為表裡夜啼而遺溺者是也見燈煩躁愈啼者心熱甚也遇寒即啼者寒疝也面色紫黑氣鬱如怒若有恐懼睡中驚跳者誤觸神祗而夜啼也法宜分陰陽運八卦運五經撈明月清天河心經如寒推三陽方用燈心燒灰擦母乳頭與兒餂之即止諸熱門諸熱各有其因要辨虛實寒冷如胎熱兒生三朝旬日月間目閉面赤眼胞浮腫常作吟呻或啼哭不已時復驚煩小便黃色此因在胎受母熱毒因有此症若不速治便成鵝口重舌木舌赤紫丹瘤等症又不宜以大寒之法攻之熱退則寒起傳作他症切宜慎之法宜分陰陽運八卦清天河水底撈明月掐腎水揉外牢宜服延壽丹潮熱往來時熱往來來日依時而發依時而退如潮水之應不差故名潮熱大抵因飲食不調中有積滯以致血氣壅盛熱發於外伏熱者大便黃而氣臭宿寒者大便白而酸臭是也法宜分陰陽運八卦運水入土撈明月宿寒加推三關氣湊則天門虎口𦙒肘驚熱心既受驚氣則不順身發微熱而夢寐虛驚面光自汗脈數煩躁治當與急驚同法宜分陰陽運八卦清心經清肺經清天河撈明月二人上馬風熱身熱面清口中亦熱煩叫不時或大小便結下之法宜分陰陽運八卦掐心經清肺經清天河二人上馬運水入土撈明月四肢掣跳用二龍戲珠便結用雙龍擺尾退六腑宜服延壽丹煩熱血氣兩盛臟腑實熱表裡俱熱煩躁不安皮膚壯熱是也法宜分陰陽運八卦運五經揉外牢退六腑清心經清肺經清天河撈明月以指掐湧泉為主脾熱舌絡微縮時時弄舌因脾臟積熱不可妄用涼法治法宜分陰陽運八卦清心火清脾經掐總經推三關退六腑二人上馬撈明月合上俱宜服延壽丹虛熱因病後血氣未足四肢瘦弱時多發熱一日三五次者此客熱乘虛而作宜調氣血補虛其熱自退法宜分陰陽運八卦運五經推三關天門入虎口揉𦙒肘飛金走氣撈明月實熱頭昏頰赤口內熱小便赤澀大便閉結此實熱之症也宜下之泄去臟腑之熱即安法宜分陰陽運八卦清大腸清腎水二人上馬撈明月退六腑為主積熱眼胞浮腫面黃足冷發熱從頭至肚愈盛或惡聞飲食氣嘔吐噁心肚腹疼痛治法宜分陰陽運八卦推大腸運五經清心經運土入水撈明月退六腑天門虎口𦙒肘飛金走氣宜服延壽丹疳熱因過餐積滯郁遏成熱脾家一臟有積熱不清傳之別臟遂成五疳之疾若脾家病去餘臟皆安法宜分陰陽運八卦推大腸運土入水推脾土揉中脘撈明月虎口𦙒肘掐總經少推三關多退六腑揉湧泉血熱每日辰巳時發遇夜則涼非虛非疳乃血熱之症也法宜分陰陽運八卦運五經清腎水二人上馬撈明月揉𦙒肘揉湧泉推三關少退六腑多骨蒸熱骨熱而蒸有熱無寒醒後渴汗方止非皮膚之外熱也皆因小兒食肉太早或多食炙爆麵食之類或好食生冷之物或衣棉太厚致耗津液而成或疳疾之餘毒傳作骨蒸法宜分陰陽運八卦運五經清天河掐橫紋撈明月打馬過天河運土入水宜服延壽丹肚熱血氣壅實五臟生熱蒸尉於內一向不止眠臥不安精神恍惚重發於外表裡俱熱甚則發驚法宜分陰陽清天河水底撈月退六腑服延壽丹溫壯熱溫溫不甚熱與壯熱相類而小異由胃氣不和氣滯壅塞故蘊積體熱名曰溫壯熱大便黃臭宜微利之法宜分陰陽運八卦運五經清大腸清腎水撈明月退六腑虎口𦙒肘熱重不退法宜清宜泄水底撈月揉湧泉引熱下行揉臍及鳩尾小兒口吐熱氣身子不熱此心經熱也法宜分陰陽運八卦清心經清天河掐總經補腎水小兒諸熱不退法宜將水濕紙團放在小兒手心內再用水底撈明月法立效以上諸熱皆可推惟小兒變蒸熱乃初生時陰陽水火蒸於氣血而使形體漸長成就也切不可推推則受害醫者照前總論變蒸按小兒生日計算之則不差誤矣手法三陰三陽祕旨兼刺法早晨發熱曰潮熱寅卯辰時為壯熱手足動搖目上視頭悶項急口內熱此是肝家起病由推拿同前用手訣刺手大端處韭葉邊許刺出血泄心肝愈日午發搐為潮熱巳午未時不堪掣心驚神悸目上視白精赤色心家熱牙關緊閉口內痰少衝刺血兒救得刺小兒手內端少衝穴血出即愈日晚發搐潮熱足申酉戌時不堪搐目斜微喘身稍熱清腎泄肺刺指側睡露睛時手足冷推法同前不可缺刺手少商穴血出即愈夜間發搐因潮熱亥子丑時不堪搐身體溫和臥不穩眼睛緊而斜視側喉中痰湧銀褐色泄肺湧泉二三百須灸足中指節下三壯刺正衝穴羅紋出血即愈驚風門小兒有熱熱甚生驚驚盛發搐又盛則牙關緊急而八候生焉八候搐搦掣顫反引竄視也搐者兒兩手伸縮搦者十指開合掣者勢如相撲顫者頭偏不正反者身仰向後引者臂若開弓竄者目視似怒視者露睛不活是八候也又有驚風痰熱之四症相因而生二十四驚之症然總不外急慢兩端急慢驚風歌急驚推拿宜泄痰火一時相攻自上而下莫從容攻去痰火有用推拿慢驚須補自下而上相從一切補泄法皆同男女關腑異弄急驚父母惶恐慢驚醫者擔心不語口閉眼翻睛下手便掐威靈大指兩手齊掐兒嫩隔絹為輕一聲叫醒得歡欣不醒還須法應口鼻業已無氣心窩尚覺微溫人中一燭四肢心後燭承山有準囟陷不跳必死開而跳者還生再掐中衝要知音知痛聲音動聽大溪眼可掐動腎頭掐亦蘇醒兩乳穴下探生死舍此何須又論慢因吐瀉已久食積脾傷而成先止吐泄補脾經莫使慢驚成症脾虛飲食不消胃冷飲食難進眼轉氣虛吐弱甚慢脾驚候一定面上已無氣色痰又滿在咽喉慢驚風症使人愁補脾清痰速救慢驚諸法無救用艾米粒為形百會三壯燭醒醒久咳又燭乳根二十四驚辨症祕旨胎驚兒初生柔軟眼閉不開其原因在母腹中受氣不全即胎受傷宜掐威靈為主如掐之不叫用燈火燭上天心一燋湧泉一燋宜推三關補肺經為主月家驚小兒月內搖拳頭偏口撮不食乳其原因母胎辛熱遺毒退六腑二人上馬為主如撮口用天南星去皮臍為末樟腦少許和勻搽牙齦即開口若落地眼紅撮口手捻拳頭偏左右驚聲不出母食煎炒所致加用二龍戲珠天門虎口𦙒肘臍風驚口撮吐沫腹硬頭偏搐掣手捻拳臍翻哭無聲其原因剪臍受風小肚下有一筋直上臍來此筋到臍不可救若未到急須先用燈火攔頭燭百會穴三下攔回可救臍門上用火七燋大指四焦湧泉七燋臍未翻神門一燋宜推三關取汗為主臍翻不治鎖心驚鼻流鮮血口紅眼白身軟好食冷物其原因心火太盛宜明月天河為主退六腑清心經推腎水分陰陽飛金走氣掏五指節天門虎口𦙒肘諸法方用延壽丹三分急驚風手足捻拳四肢亂抓掣跳口斜眼偏其原因喧響受喝宜安神掐威靈為主又掐心經中衝穴掐四橫紋清肺經分陰陽運八卦運五經撈明月清天河猿猴摘果清心經方用大田螺撥開眼蓋放冰片三釐少刻成水茶匙挑入兒臍內雖一叫而死即刻醒活立愈慢驚風眼翻白不食乳四肢壅軟拽氣無時其原因內傷已久胃氣漸脫宜補脾土為主分陰陽運八卦補肺經推三關揉小天心走搓摩赤鳳搖頭若手法不能又必推三關以補元氣為主夜啼驚遇晚悲啼哭聲不止其原因心火上炎邪火入心面紅宜安神清心為主分陰陽運八卦清肺經撈明月清天河退六腑方用延壽丹燈心火灰水調服擦乳上兒食乳下之亦可嘔吐驚四肢冷肚響眼翻嘔吐乳食其原因胃腑受寒宜運八卦取汗為主分陰陽推三關推肺經揉天心二人上馬運五經運八卦揉天樞推囟門橫紋又用後止吐推法總祕旨凡推主穴如兒年數余法少減可也潮熱驚遍身不時發熱口渴氣喘其原因乳食傷風乃諸病之萌芽宜清天河為主又分陰陽運八卦揉二扇門取微汗撈明月掐五指節宿沙驚至晚申酉時人事昏沉口眼俱歪邪人事不醒其原因睡含乳口角感風推三關分陰陽為主又掌心揉臍如不應將燈火燭四心各一焦擔手驚兩手擔下眼黃翻下口黑麵紫人事昏迷其原因肺經受風掐不知痛宜補脾經推三關黃蜂入洞取汗為主又運水入土天門虎口𦙒肘方用麝香擦腳心細茶洗口忌風乳食多時可愈盤腸驚氣吼肚脹飲食不進人事瘦弱肚起青筋眼黃大小便少其原因六腑有寒宜推三關黃蜂入洞取汗為主又推大腸揉臍及龜尾補腎水運水入土如眼黃筋滿肚難治撒手驚手足一掣一跳忽一撒竟死其原因肺經受風喝宜清肺為主又分陰陽運八卦清心經赤鳳搖頭二龍戲珠運土入水推三關退六腑拿總經推脾土方用吳茱萸付兒掌心上捏之必愈忌生冷水瀉驚肚鳴身軟眼唇俱白其原因傷乳食所致宜補脾土為主又推三關分陰陽推大腸天門虎口揉𦙒肘揉臍及龜尾一日推兩次待泄後下午補一次補脾後從龜尾擦上七節骨方用抱龍丸凡驚此丸俱治如麻痘首尾並時疾亦可服天吊驚頭向上手向上哭聲嗥叫鼻流清水四肢掣口眼歪邪其原因心火克肺肺家有熱上炎宜清心肺為主法又分陰陽推三關運八卦清天河揉小天心補腎水清肺經清心經二人上馬飛金走氣如不應用燈火燭神闕一燋方用傘一把倒吊鵝一隻將碗接鵝口中涎與兒服之即愈內吊驚咬牙寒戰哭聲不止臉黃口眼歪邪掐不知痛其原因脾肺受病小兒或弄水或雨露冷氣衝之寒於內遂成驚宜推三關取汗為主又推脾土補腎水分陰陽走搓摩補肝經運水入土方用乳香丸彎弓驚四肢向後頭昂肚仰哭不成聲其原因肺受寒宜推三關取汗為主又推肺經補腎運八卦分陰陽掐四橫紋赤鳳搖頭掐蟹溪左右重揉委中方用百草霜蘄艾揉烘縛膻中心坎上鳥鵲驚忽大叫哭一聲即死手足掣跳口開聲變其原因心經受嚇痰火攻心宜清心經清天河撈明月為主服延壽丹馬啼驚兒頭向上四肢亂舞其原因被風嚇宜二龍戲珠為主推三關運八卦推脾土分陰陽黃蜂入洞方用蔥白研並敷臍再輕輕把二人上馬一揉少與乳食即愈鯽魚驚口吐白沫四肢動搖眼掣口斜其原因五臟有寒受嚇宜安神取汗為主法用推三關推肺經運八卦推天河運水入土走搓摩方用細茶蛤粉搓囟門忌乳食肚脹驚氣喘青筋裹肚腹脹眼翻作瀉其原因乳多傷脾外受風寒宜推三關取汗揉臍為主又分陰陽運八卦補腎經揉神闕推大腸走搓摩方用蔥白研細作餅隔火紙七層敷臍將蠶絲系之即愈蛇絲驚口中舌撩吐青煙四肢寒冷其原因心經蘊熱宜退心火為主又分陰陽運八卦退六腑清天河撈明月清心經運水入土方用薄荷煎湯洗口數次米疳水又洗口數次蛤粉擦湧泉穴即愈鷹爪驚撒手亂抓腳掣頭搖身戰眼光哭聲不止其原因肺受風心經煩躁宜分陰陽退心熱為主又分陰陽運八卦清心經清肺經推天河飛金走氣按弦走搓摩急沙驚口唇青四肢冷筋青四掌心有黑氣其原因五臟受寒邪推肺經取汗為主此症一汗即愈推三關推肺經運八卦黃蜂入洞如不應用雞翎蘸香油探喉吐痰若不吐外牢推大陵或用滌痰神咒以吐汗為主推訖仍補脾土運八卦後見風不畏凡推驚不可拘推三回一之說但推到其中回幾下便是驚者筋也驚見便是驚風不省人事治法灸上天心湧泉大指甲側痰喘門小兒痰喘痰或作喘彼不知吐須用法取之若不取吐痰老難治肺虛喘聲短實則喘聲長虛補實泄法用分陰陽運八卦運五經掐四橫紋乾離重推補脾土小便赤清天河退六腑飛金走氣嘴唇紅按弦走搓摩揉臍及肩井曲池氣喘合陰陽又總筋清天河立止氣吼發熱揉承山天門入虎口揉𦙒肘赤鳳搖頭飛金走氣痰盛眼欲上竄頭往上昂掐兩乳下一指期門穴即止痰迷心清心經清肺經揉外牢宮揉精靈掐五指節天門虎口𦙒肘吐痰法分陰陽運八卦清心經大陵推至外牢左轉三來右一摩如不吐口念咒云無凡火不成天火無凡水不成仙水用生礬兒小三釐大用五釐將滾水沖之左手三叉訣托水盅右手用劍訣向水碗上書滌痰大將軍敕令書畢書符有食寫食字無食寫火字將水與小兒飲之半個時辰其痰即吐止吐法分陰陽運八卦掐心經左轉揉之揉乾離掐外牢宮左轉推三關掐大陵位左轉清肺經補脾土掐湧泉左轉其吐即止如再吐是火熱宜補脾土運八卦乾離重推將手掌搓熱揉小兒心窩左轉即止化痰多掐五指節痰壅揉湧泉穴左揉肺氣盛右揉心火泄嘔吐門有物有聲名曰嘔乾嘔則無物有物無聲名曰吐嘔者有聲吐者則無聲嘔吐出物也胃氣不和足陽明經胃脈絡陽明之氣下行則順今逆而上行故作嘔吐有胃寒胃熱之不同傷食胃虛之各異病既不一治亦不同諸吐不止必因乳食所傷大要節乳為最凡吐不問冷熱久吐不止胃虛生風恐成慢驚之症必須預防如已成慢脾風症常嘔腥臭者胃氣將絶之兆也熱吐夏天小兒遊戲日中伏熱在胃或母感冒暑氣承熱乳兒或過食辛熱之物多成熱吐其候面赤唇紅五心煩熱吐次少而出多乳片消而色黃是也法宜分陰陽運八卦清肺經囟門至橫紋補脾土揉外牢乾離重揉赤鳳搖頭撈明月冷吐冬月感冒風寒或乳母受寒承寒乳兒冷氣入胃或食生冷或傷宿乳胃虛不納乳片不化喜熱惡寒四肢逆冷吐次多而出少者是也法用分陰陽運八卦推三關推肺經推脾土推囟門至橫紋乾離重揉寒食吐夾食而出吐必酸臭惡食胃痛身發潮熱是也法宜分陰陽運八卦揉中脘按弦走搓摩揉臍及龜尾補脾土虛吐虛吐者胃氣虛弱不能存留乳食而作吐也法宜分陰陽運八卦推三關多補脾土運五經運土入水囟門推至橫紋止吐推法總祕旨掐心經左轉揉之掐外牢宮推三關補脾土運八卦乾離重揉掐四橫紋推囟門至橫紋清肺經其吐即止咳嗽門咳嗽之症必因感冒而成蓋皮毛者肺之合也先皮毛受邪氣邪氣得從其合則傷於肺故令嗽也乍暖脫衣暴熱遇風汗出未乾遽爾戲水致令傷風咳嗽初得時面赤唇紅氣粗發熱此是傷風痰壅作嗽嗽久津液枯耗肺經虛矣肺為諸臟華蓋臥則開坐則合坐則稍寬臥則氣促乃因攻肺下痰之過名曰虛嗽又當補脾土而益肺氣運土入水借土氣以生金則咳自愈咳嗽歌咳嗽連聲風入肺重則喘急熱不退肺傷於寒咳嗽多肺經受熱聲壅滯寒宜取汗熱宜清實當泄之虛當補嗽而不止便成癇痰盛不已驚風至眼眶紫黑必傷損嗽而有血難調治總法宜分陰陽運八卦肺經熱清寒補揉二扇門運五經二人上馬掐五指節掐精靈穴揉天樞前揉膻中後揉風門兩手一齊揉補脾土側推三關心經熱清寒補按弦走搓摩離上推至乾上止中虛清揉肺俞穴拿後承山穴面青發喘清肺經發熱清天河撈明月小許痰喘推法盡此矣方用麥門冬煎汁入洋糖晚煎次早熱服五次即愈傷寒門小兒面目俱紅不時噴嚏氣粗身熱此是傷寒或四肢冷開口大叫閉口痰聲傷寒一日遍身發熱頭痛腦痛人事昏迷言語胡亂法宜分陰陽運八卦運五經掐心經揉外牢宮掐陽池推三關揉二扇門黃蜂入洞傷寒二日結胸腹脹阻食沉迷內熱外寒遍身骨疼痛法宜分陰陽運八卦運五經清心經推三關側推虎口補脾土飛金走氣傷寒三日遍身骨節疼痛大小便不通腹作脹法宜分陰陽運八卦運五經清心肺飛金走氣雙龍擺尾赤鳳搖頭水底撈明月運土入水傷寒四日腳疼腰痛眼紅口渴飲食不進人事顛亂法宜分陰陽運八卦揉上天心清心肝二人上馬撈明月推脾土打馬過天河傷寒五日傳遍經絡或大便不通小便自利或噎氣霍亂法宜分陰陽運八卦運五經退六腑水底撈明月鳳凰單展翅傷寒六日血氣虛弱飲食不進腰痛氣喘心痛頭痛法宜分陰陽運八卦天門入虎口𦙒肘推三關補脾土掐陽池赤鳳搖頭傷寒七日傳遍六經發散四肢各傳經絡或痢或瘧加減推之法宜分陰陽運八卦清天河二龍戲珠合陰陽掐四橫紋推脾土推三關側推大腸治小兒風寒感冒頭疼以取汗為主蓋風與寒皆隨汗散也法宜分陰陽運八卦推三關揉二扇門掐陽池黃蜂入洞治小兒陰寒尤宜取汗為主汗出必深藏勿令見風恐因汗又入法同前治小兒咬牙法宜分陰陽運八卦推三關補腎水積滯門小兒乳食不節或過食生冷堅硬之物致令脾胃不能克化積滯中脘壯熱足冷腹脹昏睡不思飲食者宜攻其積法宜分陰陽運八卦運五經掐小橫紋揉囟門推大腸推三關退六腑天門虎口𦙒肘重補脾土揉中脘發熱加撈明月揉臍及龜尾腹痛掐一窩風揉中脘膨脹加按弦走搓摩不化飲食揉外牢宮腹痛門小兒腹痛有三或冷或熱或食積臍上者熱臍中者食臍下者冷小兒不能言須察面色熱痛面赤腹脹時痛時止暑月最多法宜分陰陽陰重陽輕運八卦運五經推三關少退六腑多揉一窩風大陵推上外牢訖補脾土虎口𦙒肘傷食痛面如常心胸高起手不可按腸結而痛食生冷硬物所傷其氣亦滯法宜分陰陽運八卦運五經側推虎口補脾土揉一窩風揉中脘揉囟門天門虎口𦙒肘揉臍及龜尾大陵推上外牢宮訖運土入水冷痛面青肚響唇白痛無增減法宜分陰陽陽重陰輕運八卦運五經掐一窩風按弦走搓摩推三關推肚角穴揉臍推脾土天門虎口揉𦙒肘大陵推上外牢泄訖補脾土冷氣攻心痛者手足冷遍身冷汗甚之手足甲青黑脈沉細微是也法宜分陰陽運八卦推三關補腎水揉二扇門黃蜂入洞瘧痢總論祕旨瘧痢二症世人常病之大約著論多而確言少立方多而取效殊不知瘧痢二症多在夏秋之交以夏季之月專屬脾土子時陽氣散極伏陰在內人苦皮膚之熱而昧其內之涼也乃納涼風飲涼水以勝之夫土本懼寒而以寒投之於是食膠於脾而不能化痰結於脾而不能解痰乃五味之涎風火轉成才交涼而瘧病矣脈弦而實是食一日一發輕難好脈弦而滑是痰三日一發重易好至於痢多言赤屬熱白屬寒不知此亦內傷生冷故暑濕之氣承之傷血分多則赤傷氣分多則白氣血兩傷則赤白兼雜經云調血則便濃自愈血歸經不妄行提風氣則後重自除氣下陷故後重此乃不易之定論也若投以涼劑必致禁口滑腸趨之於死小兒藥愈者十之一推愈者十之九蓋瘧者殘瘧之症痢者流利之症根深而勢篤非精於此未易愈也瘧疾門小兒瘧疾有四一瘧疾二三日一發則昏昧原因脾土痰結脈弦而滑宜吐之法宜推肺經推三關運八卦分陰陽掐四橫紋揉天樞掐內間史猿猴摘果拿列缺走搓摩二食瘧一日一發腹脹作嘔原因脾土結食宜下之法宜推三關推脾土補腎水運八卦分陰陽天門虎口𦙒肘揉中脘按弦走搓摩三痎瘧夜間則發即邪瘧也原因水邊戲耍感露風雨寒宜取汗法宜推三關推肺經掐手背指節掐橫紋威靈穴一截方用獨蒜研餅貼內間史纍灸一壯四虛瘧前症至一二月後便成虛瘧原因血氣兩虛以補中益氣為主法宜推三關補腎水虎口𦙒肘二人上馬一截威靈穴一截止瘧推法祕旨初起只在前汗方加少商穴愈如久法宜推三關推肺經分陰陽運八卦補脾土天門虎口𦙒肘方用祝由科神妙痢疾門小兒痢疾有三不獨積疳所成亦且冷熱各異宜調和氣血為主以分陰陽為要赤白痢因血氣兩傷有熱有寒宜調和為主法宜分陰陽運八卦側推大腸到虎口補脾土補腎水揉臍及龜尾擦七節骨先泄後補天門入虎口重揉𦙒肘赤痢濕熱傷血宜調血為主宜分陰陽陰重陽輕運八卦坎重若以紅少白多止側推三關不退六腑側推大腸掐大腸撈明月天門虎口𦙒肘訣揉臍及龜尾擦七節骨先泄後補白痢濕熱傷氣以和氣為主法宜分陰陽陽重陰輕運八卦離宮重補脾土側推大腸到虎口天門𦙒肘揉臍及龜尾擦七節骨先泄後補噤口痢因內熱不清不投以良法遂成噤滑法宜分陰陽運八卦運五經推三關退六腑清天河揉囟門補脾土鳳凰單展翅天門虎口𦙒肘訣撈明月揉臍及龜尾擦七節骨先泄後補方用延壽丹神效泄瀉門胃為水穀之海其精英流布以養五臟糟粕傳送以歸大腸若內由生冷乳食所傷外因風寒暑濕所感飢飽失時脾不能消冷熱相干遂成水瀉苟脾胃合氣以消水穀水穀既分安有水瀉也蓋脾虛則吐胃虛則瀉脾胃兩虛吐瀉並作久瀉不止元氣下脫必傳慢驚宜大補之法宜分陰陽運八卦側推大腸到虎口補脾土推三關運水入土揉臍及龜尾訖推補七節骨如熱加撈明月打馬過天河詩云肝冷傳脾臭緑青焦黃脾土熱之形肺傷寒色膿黏白赤熱因心腎熱成成霍亂也霍亂者揮霍撩亂也外感內傷陰陽乖隔上吐下瀉心煩氣悶之症也法宜分陰陽運八卦運五經側推大腸補脾土掐四橫紋運水入土推三關退六腑囟門推至大橫紋橫紋推轉至囟門痞疾門食積既久頑結成痞左積為痰痰從食起右積為氣氣與痰結宜速除之久者七日十日方消法宜分陰陽運八卦運五經掐四橫紋推三關補脾土久揉按弦走搓摩側推大腸到虎口清肝火清肺經天門虎口揉𦙒肘方用田螺師車前草搗敷丹田腫脹門腫有十症大抵濕熱脾虛而起脈浮為風虛沉伏為水病沉則脈絡虛伏則小便難即為正水脾脈虛大多作脾腫因循不治乃成水腫蓋脾土喜燥而惡濕土敗不能治水則停蓄不行留滯皮膚故作浮腫初起時見眼胞早辰浮突至午後稍消然此症夏與秋冬治之頗易惟春水泛溢兼之肝木旺而脾土受克不能治水所以難療進退不常須徐徐調理取效大凡小兒浮腫先用發散然後行泄法推用蔥姜加真麻油再用酒一盞飛鹽少許皂角一片為末黃土一盅同炒布包倒合手心掐大指節即消法宜分陰陽運八卦推三關推脾土黃蜂入洞運五經揉二扇門以止泄補腎水虎口𦙒肘補脾土運土入水氣腫專是脾虛不能生金以致肺家虛氣作脹宜分陰陽運八卦推三關補脾土運水入土天門虎口𦙒肘按弦走搓摩此推用淡醋亦可又有浮腫因小兒多食傷濕氣不行故腫非水非氣食散而腫自消法宜分陰陽運八卦揉中脘按弦走搓摩揉囟門天門虎口𦙒肘補脾土灸龜尾男左女右疳疾門五臟俱能成疳先從脾傷而起其兒面黃口白肌瘦肚大發稀豎必脾家病去諸臟方安故以補脾為主法宜分陰陽運八卦少推三關多退六腑側推大腸到虎口清天河清腎水按弦走搓摩重補脾土方用延壽丹決明良方其效如神救活甚易齁疾門小兒齁疾如種上相沿遇天陰發者不必治或食生鹽或傷風寒者一推即愈宜分陰陽運八卦推三關推肺經掐橫紋掐指尖重揉二扇門黃蜂入洞揉腎水取汗輕者合陰陽照天河從總經極力一推至曲池方用六味地黃丸加肉桂附子為丸食之可保無虞然而根難除也大人如此淋澀門小兒淋澀火也宜清之法宜分陰陽運八卦運五經清腎水清天河撈明月向丹田擦下多上少如小水不止十數遍以至百遍乃真火少不能剋水補元氣為妙法宜分陰陽運八卦補脾土補腎水運水入土重推三關大小便結法宜分陰陽運八卦補脾土清腎水運水入土小便結用運土入水大便結用退六腑雙龍擺尾方用蔥白加蜂蜜搗成膏攤布上小便結貼腎囊大便結貼肚臍立愈腎水枯短法宜揉小天心補腎水補肺經目疾門火眼之症有三有上視有下視有兩目齊閉不開總因肝臟熱又兼有風以散風清火為妙宜分陰陽運八卦清天河撈明月掏合骨補腎水二人上馬掐陽池退六腑揉上天心上視往下揉下視往上揉不開從中間兩分揉抹若風眼治法同前但彼退六腑此推三關眼脹頭痛宜風池一截上視泄心經掐中衝橫紋右視掐右端正左視掐左端正方總服延壽丹以燈心湯送下即愈雜症門治頭瘡推三關推肺經分陰陽揉太陽推脾土清心火揉陽池治口內生瘡退六腑清心經撈明月清天河補腎水治偏墜推三關補腎水多用工推囟門清天河掐承山分陰陽方用艾草為囊為腎子兜之為妙治聤耳流膿宜推三關退六腑推脾土補腎水清天河揉耳珠先泄後補小便赤黃宜掐小指尖清腎水掐小橫紋二人上馬分陰陽撈明月治眉眼不開宜揉上天心掐陽池掐橫紋治口渴咽乾氣虛火動宜清天河撈明月天門虎口𦙒肘治四肢厥冷宜推三關補脾土治口啞不語乃痰迷心竅也宜清肺經推囟門揉天樞治手不屈伸乃風也宜揉威靈穴治四肢軟乃氣血虛也宜補脾土掐四橫紋天門虎口𦙒肘治手捻拳乃心經熱也宜清心經撈明月治頭痛宜掐陽池揉外牢若頭向上又宜補脾土運八卦治吐血掐母腮穴在兩大指甲後一韭菜宜手掐治汗多乃腎虛也宜補腎水汗即止治心氣冷痛宜揉三焦治腰痛下元虛也推三關推命門治上下氣不和通宜掐四橫紋天門𦙒肘運五經治小腸寒氣宜推囟門推三關補腎水治身麻木宜打馬過天河天門虎口𦙒肘治通肺腑氣血宜曲池一截治吐揉心窩治口水多補脾土揉囟門治內熱外寒掐腎水即止外熱內寒掐陽池推三關汗出為度治頭軟上天心一燋臍上下各一燋治作寒掐心經作熱掐腎經治口不開多揉脾土掐頰車揉心窩治鼻作干清肺經推年壽兩分下至寶瓶效治內消久揉脾土後心以肚響為度治胃氣疼久揉三里穴以此屬胃肚痛亦用之方用蒼朮面釐半五倍子面釐半共三釐酒沖服之立愈治前撲掐委中穴亦能止大人腰背痛治氣喘口歪眼偏口不出聲口渴等症掐精寧久拿承山治口瘡在內掐總經推天河治危症先劈面吹一口氣若眼皮連動睛活轉可救若魚目脾絶不治腫毒門凡腫一起用極肥皂角子陰陽瓦焙成面酒沖服三錢睡時帶汗即消散或先用天篷符咒亦妙又方用榆樹南行根條取來洗淨加糖搗又加鹽少許敷上即消散小兒軟癤妙方用銅緑一兩研細入柏柚煎成膏攤布上貼之即消
