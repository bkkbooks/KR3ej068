body:
  text: 卷三推拿手法分陰陽陰陽者手掌下右陰池穴左陽池穴也其穴屈小兒四指拳過處即坎宮小天心處以我兩手大拇指從小天心處兩分推之蓋小兒之病多因氣血不和故一切推法必先從陰陽分起諸症之要領衆法之先聲推此不特能和氣血凡一切膨脹泄瀉如五臟六腑有虛或大小便不通或驚風痰喘等疾皆可治之至於乍寒乍熱尤為對症熱多則分陽從重寒多則分陰從重推者必審其輕重而用之凡症必先用此法用時醫者正好察色審音探問因由而斟酌其對症之手法也合陰陽合者以我兩大指從陰陽處合來蓋因痰涎湧甚先掐腎經取熱當作涼然後合陰陽照天河極力推去而痰即散也小天心因額上有大天心故此陰陽中間名小天心臨坎水小水赤黃揉此以清腎水之火眼翻上下掐之甚妙若繞天心則已在分陰陽之內矣運八卦八卦在手掌上中指根下是離宮屬心火此宮不可運動恐運動心火運法必用我大指按復之然後以我食指頭從乾宮向兌坤小指邊左旋到坎歸乾為一運其運至離宮則從大指甲上過去此法開胸化痰除氣悶滿脹至於吐乳食有九重三輕之法醫者分陰陽之後必次及於此運五經五經者五指頭之經絡也心經在將指肝經在食指脾經在大拇指肺經在無名指腎經在小指運者以我食指運小兒五指頭肉上此法能治大小便結開咽喉胸膈中悶塞以及肚響腹脹氣吼泄瀉諸症蓋五臟之氣運動即能開利運水入土泄土者胃土也在𦙀門穴上屬艮宮水者腎水也在小指外邊些運者以我大指從小兒小指側巔推往乾坎艮也此法能治大小便結身弱肚起青筋痢瀉諸病蓋水盛土枯運以潤之小水勤動甚效運土入水補土者脾土也在大指水者坎水也在小天心穴上運者從大指上推至坎宮蓋因丹田作脹眼睜為土盛水枯運以滋之大便結甚效側推大腸到虎口大腸穴在小兒食指外邊虎口在大食二指掌丫處側推者以我大指從兒食指旁尖推往虎口蓋因赤白痢水瀉皆屬大腸之病必推此以止而補之且退肝膽之火推者必多用工夫若大腸火結退六腑足矣不必推推脾土脾土在大拇指上羅紋男左旋女右旋而程公權云不如屈小兒大指內推為補直指外推為清蓋因小兒虛弱乳食少進必推此有效至痰食諸症又必先泄後補總之人一身以脾土為主推脾土以補為主清之省人事補之進飲食萬物土中生乃一身之根本治病之要著也推腎水腎水在小拇指外旁從指尖一直到陰池部位屬小腸腎水里推為補外推為清清者因小兒小水赤黃補者因腎水虛弱清退臟腑熱補因小便短少推肝木肝木在食指肝屬木木生火肝火動人眼目昏閉法宜清諸病從火起人最平者肝也肝火盛則傷脾退肝家之熱又必以補脾土為要推心火宜清不宜補補則於人不利宜切記心屬中指指根下離屬火凡心火動口瘡弄舌眼大小眥赤紅小水不通皆宜推而清之至於驚搐又宜清此心經內一節掐之止吐推肺金肺金在無名指屬氣止咳化痰性主溫和風寒入肺固嗽傷熱亦嗽熱宜清寒亦宜清惟虛宜補而清之後亦宜補凡小兒咳嗽痰喘必推此驚亦必推此推離往乾離在將指根下乾在二人上馬之左旁以我大指從兒離宮推至乾宮打個圓圈離乾從重中要虛男左女右蓋因冒風咳嗽或吐逆掐肺經指節之後必用此法為主二人上馬二人者我之大食二指也上馬者以我大指尖按兒神門外旁又以我食指尖按兒小指根橫紋旁掐之清補腎水治小腸諸氣最效若單掐腎水一節橫紋退潮熱立效又蘇音蘇醒也胃氣起沉疴左轉生涼右轉生熱掐四橫紋四橫紋在食將無名小指指根下橫紋一名小橫紋小者對下大橫紋而言也四者四指也掐者以我大指掐之按穴不起手微動卻有數其數如推運之數蓋因臟腑有熱口眼歪斜嘴唇破爛掐此退熱除煩且止肚痛點內牢內牢在手心處屬涼撈明月在此點者輕輕拂起如蜻蜓之點水退心熱甚效揉外牢外牢在手背居中緊與內牢對故亦名牢宮也屬熱揉之取汗能治糞白不變五穀不化肚腹泄瀉諸病又大熱不退揉此退之是以火攻火之道也一云左轉生涼右轉生熱外牢推至大陵位大陵位在外牢下手背末骨節處在一窩風之上從外牢推至大陵位者取小兒吐痰又大陵反轉至外牢以泄心熱然以我手大指左轉三來又必向右轉一摩左從重右從輕以取吐泄神效但此九重三輕手法最易忽忘須用心切記方不錯亂若錯亂即不能吐矣𦙀門直推到橫紋止吐止瀉此為要著神效有謂取吐取瀉者則謬妄可恨矣𦙀門穴在大指下高起一塊平肉如板處屬胃脘橫紋者大橫紋也手掌下一道大橫紋𦙀門直推到橫紋止吐神效橫紋轉推到𦙀門止瀉神效若吐泄並作先推止吐一半然後合推𦙀門推去重止吐若橫紋推轉輕止泄治氣促氣攻之症推此即通快吼脹亦揉𦙀門拿總經總經在小天心下內間史上五指諸筋經絡總由此散去故名總經小兒驚風手足掣跳橫拿一個時辰如不止再掐大敦穴大敦在足大指男掐右足女掐左足若鷹爪驚本穴掐後就揉掐心經心經在將指尖中衝穴小兒驚死先掐此以試之叫一聲可治如不叫再掐威靈穴以試之雙手掐威靈威靈穴在外牢右邊與上一扇門相對雙手以我兩大指甲與甲合一齊著力如小兒手嫩以綢絹隔之掐雖重而不傷兒手此治小兒急驚一搐一死有聲治無聲不治掐精靈精靈穴在外牢左邊與二扇門相對掐此穴揉之治小兒痰湧氣促氣急用此法即散揉扇門一扇門穴在食將兩指根夾縫中二扇門穴在無名小指夾縫處以我兩大指肉掐揉之治小兒汗不出熱不退側推大三關大三關者對風氣命食指上小三關而言也屬真火元氣也其穴從魚際穴往膀上邊到手彎曲池故曰側其推法以我二指或三指從容用力自魚際推到曲池培補元氣第一有功熏蒸取汗此為要著男子左手從魚際推到曲池女子從曲池推往魚際在右手皆大補之劑大熱之藥也退六腑六腑穴在膀之下上對三關退者從𦙒肘處向外推至大橫紋頭屬涼專治臟腑熱大便結遍身潮熱人事昏沉三焦火病此為要著若女子則從大橫紋頭向里推至曲池以取涼在右手醫家須小心記之不可誤用男女惟此不同耳合上二法大寒大熱偏用若補元氣必相劑而用未可偏也但推數多寡之不同耳揉上天心上天心者大天心也在天庭中小兒病目揉此甚效以我大指按揉之眼珠上視往下揉眼珠下視往上揉兩目不開左右分揉口眼歪斜亦必揉此清天河天河穴在膀膊中從坎宮小天心處一直到手彎曲池清者以我手三指或二指自大橫紋推到曲池以取涼退熱並治淋疴昏睡一切火症俱妙揉中脘中脘在心窩下胃腑也積食滯在此揉者放小兒臥倒仰睡以我手掌按而揉之左右揉則積滯食悶即消化矣揉湧泉久揉亦能治眼病湧泉穴在腳心不著地處左揉止吐右揉止瀉男依此女反之男右腳女左腳退煩熱亦妙引熱下行揉一窩風一窩風在大陵下些掐此能止肚痛或久病慢驚皆可掐揉陽池陽池穴在一窩風之下掐此專治頭痛掐內間史內間史在總經下寸許天河路上掐此剿瘧揉膻中風門膻中在胸前堂骨窪處風門在脊背上與膻中相對揉者以我兩手按小兒前後兩穴齊揉之以除肺家風寒邪熱氣喘咳嗽之症掐五指節掌背後五指節掐之去風化痰蘇醒人事通關隔閉塞拿蹼參穴一名鞋帶穴在腳後根上驚死重拿即醒久拿必活揉天樞天樞穴在膻中兩旁兩乳之下揉此以化痰止嗽其揉法以我大食兩指八字分開按而揉之掐蟹溪蟹溪穴在腳面上彎處小兒內吊驚往後仰掐之即揉拿委中委中穴在腿彎處小兒腳不縮重拿之向前蹼掐之拿承山承山穴在腿肚中一名魚肚穴一把拿之拿此穴小兒即睡又治喘掐之即揉男右女左揉臍及鳩尾鳩尾在心窩上掩心骨是也臍乃肚臍一名神闕揉者以我右掌從小兒關元右拂上至鳩尾左旋而下如數周回蓋小兒天一真水在此取水來剋火之故也身熱重者必用此法須用三指方著力若手心則不著力矣寒掌熱指乃搓熱手心揉臍也十三大手法推拿注釋天門入虎口重揉𦙒肘穴此順氣生血之法也天門即神門乃乾宮也𦙒肘膀膊下肘後一團骨也其法以我左手托小兒𦙒肘復以我右手大指叉入虎口又以我將指管定天門是一手拿兩穴兩手三穴並做也然必曲小兒手揉之庶𦙒肘處得力天門虎口處又省力也打馬過天河此能活麻木通關節脈竅之法也馬者二人上馬穴也在天門下其法以我食將二指自小兒上馬處打起擺至天河去四回三至曲池內一彈如兒輩嘻戲打破之狀此法退涼去熱黃蜂入洞此寒重取汗之奇法也洞在小兒兩鼻孔我食將二指頭一對黃蜂也其法屈我大指伸我食將二指入小兒兩鼻孔揉之如黃蜂入洞之狀用此法汗必至若非重寒陰症不宜用蓋有清天河撈明月之法在水底撈明月此退熱必用之法也水底者小指邊也明月者手心內牢宮也其法以我手拿住小兒手指將我大指自小兒小指旁尖推至坎宮入內牢輕拂起如撈明月之狀再一法或用涼水點入內牢其熱即止蓋涼入心肌行背上往臟腑大涼之法不可亂用飛金走氣此法去肺火清內熱消膨脹救失聲音之妙法也金者能生水也走氣者氣行動也其法性溫以我將指蘸涼水置內牢宮仍以將指引牢宮水上天河去前行三次後轉一次以口吹氣微噓跟水行如氣走也按弦走搓摩此法治積聚屢試屢驗此運開積痰積氣痞疾之要法也弦者勒肘骨也在兩脅上其法著一人抱小兒坐在懷中將小兒兩手抄搭小兒兩肩上以我兩手對小兒兩脅上搓摩至肚角下積痰積氣自然運化若久痞則非一日之功須久搓摩方效二龍戲珠此止小兒四肢掣跳之良法也其法性溫以我食將二指自兒總經上參差以指頭按之戰行直至曲池陷中重揉其頭如圓珠亂落故名戲珠半表半裡雙龍擺尾此解大小便結之妙法也其法以我右手拿小兒食小二指將左手托小兒𦙒肘穴扯搖如數似雙龍擺尾之狀又或以右手拿兒食指以我左手拿兒小指往下搖拽亦似之猿猴摘果此剿瘧疾併除犬吠人喝之症之良法也亦能治寒氣除痰退熱其法以我兩手大食二指提孩兒兩耳尖上往若干數又扯兩耳墜下垂若干數如猿猴摘果之狀揉臍及龜尾並擦七節骨此治痢疾水瀉神效此治瀉痢之良法也龜尾者脊骨盡頭閭尾穴也七節骨者從頭骨數第七節也其法以我一手用三指揉臍又以我一手托揉龜尾揉訖自龜尾擦上七節骨為補水瀉專用補若赤白痢必自上七節骨擦下龜尾為泄推第二次再用補蓋先去大腸熱毒然後可補也若傷寒後骨節痛專擦七節骨至龜尾赤鳳搖頭此消膨脹舒喘之良法也通關順氣不拘寒熱必用之功其法以我左手食將二指掐按小兒曲池內作鳳二眼以我右手仰拿兒小食無名四指搖之似鳳凰搖頭之狀鳳凰單展翅此打噎能消之良法也亦能舒喘脹其性溫治涼法用我右手單拿兒中指以我左手按掐兒𦙒肘穴圓骨慢搖如數似鳳凰單展翅之象除虛氣虛熱俱妙總收法諸症推畢以此法收之久病更宜用此永不犯其法以我左手食指掐按兒肩井陷中乃肩膊眼也又以我右手緊拿小兒食指無名指伸搖如數病不復發矣十三手法歌齊拿天門虎口重揉𦙒肘並做麻木關節要通活打馬須過天河黃蜂入洞熱汗水底撈月涼寒飛金走氣化風痰按弦搓摩積散積氣積痰搓走二龍戲珠溫和雙龍擺尾解結疴截瘧猿猴摘果欲止小兒痢瀉揉臍並及龜尾赤鳳搖頭喘脹為消噎展翅單飛拿兒無名食指伸搖盡力用功有食先掐肩井中總收久病宜用永除小兒慣病要將百穴全拿若有一二法少瘥未及年逾又發十三手法卻病仙傳留救兒童醫者深思神會通浮氣粗心休用
