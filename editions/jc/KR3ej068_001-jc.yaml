body:
  text: 卷一賦歌論訣秘旨保嬰賦人稟天地全而最靈原無夭札善養則存始生為幼三四為小七齠八齔九童十稚驚癇疳癖傷食中寒湯劑為難推拿較易以其手足聯絡臟腑內應外通察識詳備男左女右為主看之先辨形色次觀虛實認定標本手法祛之寒熱溫涼取效指掌四十餘穴有陰有陽十三手法至微至妙審症欲明認穴欲確百治百靈萬不失一保生歌要得小兒安常帶飢與寒肉多必滯氣生冷定成疳胎前防辛熱乳後忌風參保養常如法災病自無干變蒸論小兒有變蒸熱症變蒸者所以變化臟腑堅強骨脈是陰陽正氣陽氣行於旦交人物之情性陰氣行於夜變人物之形體故小兒自初生至四歲八歲三十二日一變蒸而腎氣足八八六十四日再變蒸則膀胱氣足以後每增四八則一蒸使五腑氣俱足到三百二十日凡十蒸變則諸臟氣足小蒸既畢然後大蒸又積至二百零六日大蒸三遍畢然後出蒸是一歲零七個月大小蒸俱畢或一日二日發熱此不可推痘疹亦然推則拂亂其氣反受其傷故下手要觀五色辨音細問切脈察病數件庶不有誤也上唇尖有米粒又黃泡者即是察兒病症秘旨小兒之疾大半胎毒小半食傷外感風寒之症什一而已兒在胎中母飢亦飢母飽亦飽辛辣適口胎熱即隨情欲動中胎息即噪專食煎炒恣味辛酸喜怒不常皆能令子受患母若胎前不能謹節產後不能調養惟務姑息不能防微杜漸未滿百日遽與鹹酸之味未及周歲輒與肥甘之物則百疾由是而生焉小兒脾胃本自嬌嫩易於損傷乳食傷胃則為嘔吐乳食傷脾則為泄瀉吐瀉既久則成慢驚乳食停積則生濕痰痰則生火痰火交作則為急驚或成喉痹痰火結滯則成吊癇或為喘嗽胎熱胎寒稟受有病臍風撮口者胎元有毒也鵝口口瘡胃有濕熱也重口木舌脾經有實火也走馬牙疳氣虛濕熱也愛吃泥土脾臟心生疳熱也胎驚夜啼邪火入心也變蒸發熱者毒散而五臟生也丹毒者火行於外也蘊熱者火積於中而外邪乘也睡驚者內火動也喉痹者熱甚也眼痛者火動也膿耳者腎氣上衝也鼻塞者因冒風寒也頭瘡者胎毒熱攻也臍風者中痰中濕也尾骨痛者陰虛痰也諸蟲痛者胃氣傷也陰腫痛者寒所郁也盤腸氣痛者冷滯脾胃也便血者熱傳心肺也淋疴者熱鬱膀胱也吐血生腫者榮衛氣逆也小便不通者無陰有陽也大便不通者無虛有實也解顱鶴節者胎元不全也行遲發遲者血氣不完也雞胸者肺熱滿胸也龜背者風邪入脊也語遲者邪乘心也齒遲者腎不足也瘧疾者膈上痰結也痢疾者食積腹中也咳嗽者肺氣傷也喘氣者痰氣盛也心痛者蟲所齧也腹痛食所傷也內傷發熱口苦舌乾也外感發熱鼻塞聲重也腹脹者脾胃虛弱也水腫水旺土虧也疸黃者脾胃虛而有濕熱也故調理脾胃醫中之王道也節戒飲食卻病之良方驚疳積熱小兒之常病也恆居時常觀其脾微有青黑即推數百去其青黑之氣再加補脾手法可保小兒常安此為要著不可忽也然推脾必要補泄而不補則脾愈弱擦龜尾亦要補如不補則泄不止脾上用功手法之要務也痢痞痰疳小兒之重症也醫家慎之病源論得精細入手者所宜留心觀形察色審病歌觀形察色辨因由陰弱陽強發礙柔若是傷寒雙足冷要知有熱肚皮求鼻冷便知是疹痘耳涼知是風熱投渾身皆熱傷風症下冷上熱食傷仇病源論望聞問切兒有大小之不同病有淺深之不一形聲色脈之殊望聞問切之間若能詳究於斯可謂神聖工巧者矣蓋望者鑑望辨其色也假如面部左腮屬肝右腮屬肺額屬心鼻屬脾頰屬腎臟肝病面青肺病面白心病面赤脾病面黃腎病面黑是乃望而知之也聞者聽聲知其症也假如肝病聲悲肺病聲促心病聲雄脾病聲慢腎病聲沉屬於臟大腸病聲長小腸病聲短胃病聲速膽病聲清膀胱病聲微屬於腑是乃聞而知之也問者究其病源也好食酸肝病好食辛肺病好食苦心病好食甘脾病好食鹹腎病好食熱內寒好食涼內熱是乃問而知之也切者切脈察病也三周以下兒有病男左女右看三關卯是氣關寅是風關辰是命關醫難治虎口有筋往上接看之須要分五色紅黃安樂五臟和青紫定是受風嚇是乃切而知之也此其大略也看食指定症訣附虎口有三關紫熱紅傷寒青驚白是疳黑即人中惡黃者是脾端三關者即風氣命三關也五指定症歌五指梢頭冷驚來不可當若逢中指熱必定是傷寒中指獨自冷疹痘症相傳男女分左右分明仔細看手探冷熱定症訣兒心若熱跳定然是著驚熱而不跳者可知是風傷雖冷又翻眼應看是水驚視法潛菴曰醫家看病望聞問切有此四法然必以望為先故推拿小兒亦先有視法視初生小兒初生五官宜赤耳目口鼻天庭五官也初生氣血滿足其色純赤故曰赤子若一門山根二門印堂三門髮際有白氣多夭坎上坎下有黑氣是氣血不足見於口唇上下亦主夭惟鼻梁上有骨筋直上大天心為補骨插天壽而且貴主一世無驚癇視周歲正口常紅無疾白虛黑危人中黑腹痛有蟲點點黑吐痢山根紫傷乳食青多病印堂黃白吉青紅驚額青驚紅熱眉紅夜啼煩躁兩眼黑睛黃傷寒白睛黃傷食五視法一視兩目目乃五臟精華所聚遍身神氣所種最宜睛珠黑光滿輪精神明爽長壽之相也雖有疾病亦易痊愈若白珠多黑珠昏或黃或小此父母先天之氣薄弱稟受既虧自多災患二視囟門此稟父精母血而成充實逼仄其兒必壽若虛軟不堅多生疾病至囟門不合名曰解顱黑陷者必死不必治三視形貌凡口小鼻蝸眉心促皺皮膚澀滯雖不夭而多病若口大鼻端眉清目秀部位相等福壽之基也四視毛髮毛髮受母血而實故名血餘母血充實兒發明色黑光潤母血虛弱兒發黃枯定生疳痍之患五視耳門小丁方塊雙尖者主壽單尖者必夭若初生時外視單尖內按有雙骨隨後長起亦自不妨總之雙尖方塊者容或不壽至單尖必不能長大醫家視此決定存亡面部察色秘旨青主肝紅主心白主肺黑主腎黃主脾青兼紅是肝與心之疾面色青者痰也紅者熱也白者寒也黑者腎敗黃者脾氣傷也熱主心有火哭主肝有風笑主脾有痰啼主肺有傷冷主胃有濕睡主腎有虧歌曰面色黃疳疾青黑是驚風吐瀉面黃白傷寒定紫紅痢疾眉頭皺驚風兩頰紅渴來唇帶赤熱甚眼朦朧探病秘旨天中氣色清明即或生病必輕頭圓骨聳方平平荔枝陰囊壽慶眼赤肝家有熱鼻青肺內受寒牙齒臭爛毒難堪熱在腎經須看兩目流淚癢澀邪風早已在肝瘡滿口中熱毒干五腑俱可成疳冷嗽肺氣傷濕風嗽心熱何疑腸臟傷而多瀉痢冷物食積脾虛水瀉冷多浮腫水積腸臟虛鳴疳盛淋澀少精神大小不通熱甚小腸腫為下陰冷氣傳於膀胱食傷冷物啞聲音心熱相傳成病吃作魚羊肉咸沫延漫而齁𪖚遂為多嗽與多喘肺家虛熱為患糞門腫腸熱結因食冷物積成糞中帶血熱腸存霍亂陰陽感應上下氣苦不順郁逆必須運和陰陽不和虛汗多分理陰陽莫錯熱留臟中不解定然渴噪不安赤瀉熱痛欠安身痢疴久而沉悶龜胞脈穴風熱臍爛咎在安歸客風冷水之披靡心熱睡語驚飛手足四肢逆冷驚風因而大劇鵝口木舌心熱知冷汗夜啼夢囈乃是心驚被喝身生此症須知氣逆淋澀遇尿啼體熱腸蒸肝氣脾虛穀食不消胃冷飲食難進眼轉氣虛吐弱甚慢脾驚候一定面上已無血色痰又滿在咽喉慢驚風症使人愁渴燥血熱臟留肚大面青黃瘦熱疳衝於四肢醫家審定虛與實補泄全憑法治推拿小兒總訣歌附推拿小兒如何說只在三關用手訣掐在心經與勞宮熱汗立至何愁雪不然重掐二扇門大汗如雨便休歇若治痢疾並水瀉重推大腸經一節側推虎口見工夫再推陰陽分寒熱若問男女咳嗽訣多推肺經是法則八卦離起到乾宮中間宜手輕些些凡運八卦開胸膈四橫紋掐和氣血五臟六腑氣候閉運動五經開其塞飲食不進兒著嚇推動脾土就吃得飲食若進人事瘦曲指補脾何須歇直指推之便為清曲指推之為補訣小兒若作風火嚇多推五指指之節大便閉塞久不通蓋因六腑有積熱小橫肚角要施工更掐腎水下一節口出臭氣心經熱只要天河水清徹上入洪池下入掌萬病之中都去得若是遍身不退熱外牢宮上多揉些不問大熱與小炎更有水底撈明月天門虎口𦙒肘訣重揉順氣又生血黃蜂入洞醫陰病冷氣冷痰俱治得陽池穴掐心頭痛一窩風掐肚痛絕威靈總心救暴亡精寧穴治打逆噎男女眼若往上翻重掐小天心一穴二人上馬補腎經治得下來就醒些男左女右三關推上熱退下冷如鐵寒者溫之熱者清虛者補之實者泄仙人留下救兒訣後學殷勤謹慎些觀面部形色五臟秘旨心經有冷目無光面赤須言熱病當赤見山根驚四足疾成虛腫起陰陽解曰太陽黑目無光彩此心經冷也兩頰赤色乃心經熱也山根赤色心經受風下準頭主惡邪又若三陰三陽虛腫心有痰也肝經有冷麵微青有熱眉泡赤又臨髮際白兮驚便入食倉黃是積深沉解曰面青為肝經受冷主發熱驚風眉上腫有赤紋此是肝經有熱若髮際並印堂略白此乃肝驚也腮上有黃色主肝有痰也脾冷因知面色黃三陽有白熱為殃青居髮際主驚候唇口皆黃食疾傷解曰面黃印堂反白者此脾冷也三陽上有白色者乃脾熱也髮際及印堂色青者此脾驚也上下唇黃乃脾經受病也肺寒面白冷為由熱赤人中及嘴頭青在山根驚要起熱居髮際痰為仇解曰白色在麵皮及人中青者肺受冷也若人中嘴頭有赤色此乃肺有熱也山根有青色肺受驚也髮際有赤色內有痰也面黑當知腎臟寒食倉紅是熱須看風門黃色為驚入兩目微沉痰所幹解曰面有黑色腎受寒也食倉紅腎受熱也風門有黃色腎有驚也兩目微沉痰在腎也審音論凡小兒聲音大而響亮者乃五臟六腑充盈兒必易長成人如生來不曾大聲啼哭此必有一臟陰竅未通神氣未足或聲如啾唧咿唔之狀兒必不壽故望之後又必聞辨之詩云要知兒病生與死總觀面色並審音唇青耳黑兒難救哭聲不響赴陰君辨小兒聲音秘旨五音以應五臟金主聲響土主聲濁木主聲長水主聲清火主聲燥聞聲察病歌心主聲從肺出肺絕啼哭無聲多啼肝膽客風驚氣緩神疲搐盛音啞邪熱侮肺聲清毒火無侵痛聲直來淚不淋鴉聲黃泉有分輕聲兒氣必弱重濁惟痛與風狂聲高喊熱在中聲戰寒氣已重聲急連連不絕多淚必是神驚聲帶悶塞痰在心喘氣噎難順行肝病聲悲肺促脾慢心病聲雄小腸聲短大不同大腸聲長較縱腎病聲沉胃速膽清膀胱聲微重濁沉靜疳積虧聆音病知源委傷風必多噴嚏呵欠倦怠神傷撮口鴉聲氣急揚蹼跌受喝驚張切脈察病歌三周以下兒有病男左女右看三關寅是風關卯是氣辰是命關醫難治虎口有筋往上接看之須要分五色紅黃安樂五臟和青紫定其受驚嚇入掌生枝恐不詳若筋沖三關又分個枝其症十死一生惟久咳不在此論筋透三關命必亡初關乍入推宜早次節相侵亦可防筋赤定然因膈食筋青端的水風傷筋連大指陰症候陰者寒深入也花生寅卯位主蟲又主臟敗凶筋若生花主不祥筋帶懸針主吐瀉筋紋向外命難當四肢癱軟腹膨脹吐乳卻因乳食傷丫魚刺傷風向外者衝過命關向大腸倒去辨指筋紋秘訣歌小兒三關食指男左女右先詳初風中氣命三關風關驚起小恙侵氣病可進退命關逆候多亡生又珠點透三關蒿里歌聲慟唱三關筋色純黑死期不日可傷弓反裡外更難當惡候筋紋此樣食指筋紋五色紅寒紫熱須詳傷食青紫氣虛煩青黑逆多惆悵小兒指紋青色多因胎氣不全深青夜臥不安然腹病微青必見黑氣盤腸內吊牽抽發搐連綿黃兼面白瀉來纏紫色傷風不免指筋若有紅色驚入脾竅分明紅微不痢腹中寒吐瀉脾虛食禁三關深紅筋見身強發熱常驚紋弓餘食膈中停面黃脾經積病三關紋生紫色胎驚熱毒熏蒸驚時啼哭又呻吟多因紫青筋甚微紫筋因傷熱弓紋吐瀉頻頻紫青黑色常懸針曲指風熱為病了懸針主水瀉水川字主痰涎輕症脈法歌小兒六歲須憑脈一指三關定數息遲冷數熱古今傳浮風沉積當先識左手人迎主外邪右手氣口主內疾外邪風寒暑濕侵內症乳食痰兼積洪緊無汗是傷寒浮緩傷風有汗液浮而洪大風熱甚沉而細滑積乳食沉醫腹中痛不休沉弦喉內作喘急緊促之時疹痘生緊數之時驚風疾虛軟慢驚作瘛瘲音計縱小兒風病緊盛風癇發搐掣軟而細者為疳蟲牢而實者必便結滑主痰壅食所傷芤脈必主於失血虛而有氣為之驚弦急客忤君須識大小不勻為惡候三至為脫二至卒五至為虛四至損六至平和曰無疾七至八至病尤輕九至十至病勢急十一二死無疑此訣萬中無一失凡小兒三歲以上用一指按寸關尺三部常以六七至為平脈添則為熱減則為寒浮洪風盛數則多驚沉滯為虛沉實為積壞症十五候眼生赤脈貫瞳人瞳人屬腎腎有兩筋自背脊直至腦門貫其二睛心與腎交水火相濟若水火兩絕赤脈貫矣向上直視不轉睛向上直視不動腎腑俱絕手足不收毛髮豎胃主肌膚四肢胃絕則毛髮豎手足不能收管囟門腫起又作坑心主血心絕血不上行天柱骨痿頭偃後心絕不治之症咬牙出舌語不明舌乃心之外應心絕血不流行虛舌出口或舌短不語齒或咬人腎脈絕腎乃骨之主齒乃骨之餘絕則齒癢咬牙或咬人腎絕心亦絕鼻孔乾燥黑來侵鼻乃肺之外應燥黑則肺絕魚口氣粗啼不得肺為氣主肺絕則氣出不返或氣急難啼魚口一張一閉大腸脈絕忽鴉聲忽作鴉聲則大腸絕矣鴉聲變聲不止兩手抱頭目無彩肝藏血目乃肝之外應血脈不蔭則指甲青黑及目無光彩筋縮則兩手抱頭肝絕指甲黑色又傷青喉中拽鋸口吐沫凡有涎出口鼻風疾閉竅面黑形五孔乾燥不治之症是風痰竅塞關竅血脈不行不納湯藥面色青黑心寒脈絕令肺脹飲水直下胃無存肺胃俱絕飲水不歇直下大腸中去必死之症痢如死鴨鵝之血心絕臭穢血水糟湯臨臟腑俱敗四肢汗出如油出榮衛俱絕陰陽雜津液散於四肢如膠黏者不治手足擲搖那得生心絕面黑唇縮不蓋齒脾絕蛔蟲出口死形真脾絕五臟氣脫凶死訣搖頭直視心氣脫青共唇腮肝氣脫雨汗大喘肺氣脫唇縮臍番脾氣脫瞑目遺溺腎氣脫
